# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
#
mouse_hide_wait -3.0
tab_bar_style powerline
tab_powerline_style round
shell /usr/bin/zsh
notify_on_cmd_finish invisible 20
background_opacity 0.85
enable_audio_bell no
# scrollback_pager nvim -c 'set ft=man' -

# BEGIN_KITTY_THEME
# 3024 Night
include current-theme.conf
# END_KITTY_THEME

# BEGIN KITTY CURSOR

cursor_trail 200
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# END KITTY CURSOR


background_tint         0.7
background_tint_gaps    -10.0

window_border_width     1pt
active_border_color     #44ffff
single_window_margin_width 0
hide_window_decorations titlebar-only


###################################################
# https://github.com/mikesmithgh/kitty-scrollback.nvim?tab=readme-ov-file#-installation

allow_remote_control socket-only
listen_on unix:/tmp/kitty
shell_integration enabled
# Do not add the option no-prompt-mark

## Generated by nvim --headless +'KittyScrollbackGenerateKittens'
# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten '/home/volard/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py'
# Browse scrollback buffer in nvim
map kitty_mod+h kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output

# Check health with nvim +'KittyScrollbackCheckHealth'

###################################################
