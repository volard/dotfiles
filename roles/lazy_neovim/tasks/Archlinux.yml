---
- name: Install packages from pacman
  community.general.pacman:
    name: "{{ pacman_item }}"
    state: present
  loop:
    - neovim
    - fzf
    - ripgrep
  become: true
  loop_control:
    loop_var: pacman_item
  when: ansible_facts['distribution'] == "Archlinux"

- name: "Remove lazy"
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.local/share/nvim/lazy"
    state: absent

- name: "Create symlink to role files directory"
  ansible.builtin.file:
    src: "{{ role_path }}/files"
    dest: "{{ ansible_facts['user_dir'] }}/.config/nvim"
    state: link
    force: true
  when: ansible_facts['distribution'] == 'Archlinux'
