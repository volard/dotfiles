---
- name: Install required packages on Linux
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - curl
    - ripgrep
    - fd-find
    - snapd
    - gcc
  become: true
  when: ansible_facts['os_family'] in ["Debian", "Ubuntu"]

- name: Install nvim via snap on Linux
  community.general.snap:
    name: nvim
    state: present
  become: true
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: "Create config folder"
  ansible.builtin.file:
    mode: "0755"
    path: "{{ ansible_facts['user_dir'] }}/.config/nvim"
    state: directory

- name: "Create symlink to role files directory"
  ansible.builtin.file:
    src: "{{ role_path }}/files"
    dest: "{{ ansible_facts['user_dir'] }}/.config/nvim"
    state: link
    force: true
  when: ansible_facts['distribution'] == 'Ubuntu'
