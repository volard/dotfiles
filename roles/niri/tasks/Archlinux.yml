---
- name: Install niri packages from pacman
  community.general.pacman:
    name: "{{ pacman_item }}"
    state: present
  loop:
    - niri
    - xwayland-satellite
    - fuzzel
    - satty
    - jq
    - mako
    - slurp
    - waybar
    - btop
    - ttf-jetbrains-mono-nerd
  loop_control:
    loop_var: pacman_item
  become: true
