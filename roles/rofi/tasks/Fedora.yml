---
- name: Install packages
  ansible.builtin.dnf:
    name: rofimoji
    state: present
  become: true
  when: ansible_facts['distribution'] == 'Fedora'

- name: "Create symlink to role files directory"
  ansible.builtin.file:
    src: "{{ role_path }}/files"
    dest: "{{ ansible_facts['user_dir'] }}/.config/rofi"
    state: link
    force: true
  when: ansible_facts['distribution'] == 'Fedora'

- name: Ensure off.sh executable
  ansible.builtin.file:
    path: ~/.config/rofi/off.sh
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
