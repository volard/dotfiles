- name: Install programs via snap
  community.general.snap:
    name: "{{ snap_item }}"
    state: present
  loop:
    - pieces-os
    - pieces-for-developers
  loop_control:
    loop_var: snap_item
  become: true
  when: ansible_distribution == 'Fedora'


