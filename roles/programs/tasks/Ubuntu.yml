---
- name: Add CopyQ PPA repository
  ansible.builtin.apt_repository:
    repo: ppa:hluk/copyq
    state: present
  become: true
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Install required packages on Linux
  ansible.builtin.apt:
    name: "{{ apt_item }}"
    state: present
  loop:
    - fzf
    - nala
    - btop # cooler htop
    - duff # Provides information about the free space on the disk
    - ncdu # Shows the information about disk usage
    - icdiff
    - wget
    - xclip
    - lxappearance
    - git
    - vifm
    - ripgrep
    - sudo
    - curl
    - tldr
    - okular
    - eza
    - anki
    - qbittorrent
    - tmux
    - vim
    - dos2unix
    - vlc
    - bat
    - unzip
    - ncal
    - sshpass
    - rar
    - unrar
    - mpv
    - git-delta
    - nemo
    - gh
    - redshift
    - copyq
  become: true
  loop_control:
    loop_var: apt_item
  when: ansible_facts['os_family'] in ["Debian", "Ubuntu"]

# Finds a specific file or directory from the terminal
- name: Install fd-find
  ansible.builtin.apt:
    name: fd-find
    state: present
  become: true
  when: ansible_facts['os_family'] in ["Debian", "Ubuntu"]

- name: Make fd-find available by fd command
  ansible.builtin.file:
    src: "{{ lookup('pipe', 'which fdfind') }}"
    dest: "{{ ansible_facts['user_dir'] }}/.local/bin/fd"
    state: link
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Download SDKMAN installation script
  ansible.builtin.get_url:
    url: https://get.sdkman.io
    dest: /tmp/sdkman-install.sh
    mode: '0755'

- name: Install SDKMAN
  ansible.builtin.shell: |
    set -o pipefail; \
    bash /tmp/sdkman-install.sh
  args:
    creates: "{{ ansible_facts['user_dir'] }}/.sdkman"  # Prevents re-running if SDKMAN is already installed
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Clean up SDKMAN installation script
  ansible.builtin.file:
    path: /tmp/sdkman-install.sh
    state: absent


- name: Install programs via snap
  community.general.snap:
    name: "{{ snap_item }}"
    state: present
  loop:
    - vivaldi
    - discord
    - stretchly
    - obsidian
    - bottom
  loop_control:
    loop_var: snap_item
  become: true
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Download zoxide installation script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh
    dest: /tmp/zoxide-install.sh
    mode: '0755'

- name: Install zoxide
  ansible.builtin.shell: |
    set -o pipefail; \
    bash /tmp/zoxide-install.sh
  args:
    creates: /usr/local/bin/zoxide  # Prevents re-running if zoxide is already installed
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Clean up zoxide installation script
  ansible.builtin.file:
    path: /tmp/zoxide-install.sh
    state: absent

- name: Configure bottom snap connections
  ansible.builtin.command: snap connect bottom:{{ snap_connection }}
  loop:
    - mount-observe
    - hardware-observe
    - system-observe
    - process-control
  become: true
  loop_control:
    loop_var: snap_connection
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Install Flatpak
  ansible.builtin.apt:
    name: flatpak
    state: present
  become: true
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Add Flathub repository
  community.general.flatpak_remote:
    name: flathub
    state: present
    flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo
  become: true
  when: ansible_facts['distribution'] == 'Ubuntu'

