---
- name: Install packages from pacman
  community.general.pacman:
    name: "{{ pacman_item }}"
    state: present
  loop:
    - glab # gitlab cli
    - github-cli
    - git-lfs
    - go
    - bun # better node
    - base-devel
    - polkit # authorization framework that lets unprivileged processes request permission from privileged system services
    - gnome-keyring # keyring to store secrets, passwords, keys
    - libsecret # API for keyring
    - ast-grep # grep with code understanding
    # - zathura # pdf viewer
    - evince # pdf viewer
    - remind # proper reminder tool
    - zip
    - unzip
    - trash-cli
    - mise # dev tools version manager
    - fzf # fuzzy searching tool
    - qbittorrent # torrent client
    - duf # better df
    - zoxide # better cd
    - lshw
    # - vivaldi
    - telegram-desktop
    - nemo # file manager (found it better than thunder)
    - fastfetch # rip neofetch
    - blueman # bluetooth gui manager
    - btop # better htop/top
    - meld # gui diffing tool
    # - xplr # rust based lua hackable tui file manager, too complicated
    - mpv # video player
    - jq # json processor
    - yq # yaml, toml etc. processor
    - ark # kde gui archives manager
    - baobab # storage analyzer gui
    - ncdu # space analyzer
    # - hyprpicker # Wayland color picker
    - caligula # dd wrapper with cool features
    - wl-clipboard # its and couple more down are the waybinder dependencies (look for the binary in the /bin + https://gitlab.com/cscs/waybinder)
    - wtype
    - tree
    - zenity # gui gtk propmts
    - eog # eye of gnome - image viewer
    - tesseract # OCR program
  become: true
  loop_control:
    loop_var: pacman_item
  when: ansible_facts['distribution'] == "Archlinux"

- name: Install packages from AUR
  ansible.builtin.command: yay -S --noconfirm {{ aur_item }}
  loop:
    # - stretchly-bin # don't stare at screen too hard
    - zen-browser-bin
    - lazydocker-bin # docker TUI
    - throne-bin # docker TUI
  loop_control:
    loop_var: aur_item
  when: ansible_facts['distribution'] == "Archlinux"

