- name: Check if rtk is installed
  ansible.builtin.command: command -v rtk
  register: rtk_check
  changed_when: false
  failed_when: false
  when: ansible_facts['distribution'] == "Archlinux"

- name: Install rtk
  ansible.builtin.shell: curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
  args:
    executable: /bin/bash
  when:
    - ansible_facts['distribution'] == "Archlinux"
    - rtk_check.rc != 0

- name: Enable rtk globally
  ansible.builtin.command: rtk init --global --auto-patch
  when: ansible_facts['distribution'] == "Archlinux"

- name: Install peonping
  ansible.builtin.command: curl -fsSL https://raw.githubusercontent.com/PeonPing/peon-ping/main/install.sh | bash -s -- --packs=glados,peasant,peon,peon_ru,sc_battlecruiser,sc_kerrigan
  when: ansible_facts['distribution'] == "Archlinux"

- name: Use custom peonping voice pack
  ansible.builtin.command: peon packs use peon_ru
  when: ansible_facts['distribution'] == "Archlinux"

- name: Install bun tools
  ansible.builtin.command: bun i -g {{ bun_item }}
  loop:
    - "@steipete/summarize"
    - "opencode-ai"
  loop_control:
    loop_var: bun_item
  when: ansible_facts['distribution'] == "Archlinux"

- name: Install peon-ping to opencode
  ansible.builtin.command: curl -fsSL https://raw.githubusercontent.com/PeonPing/peon-ping/main/adapters/opencode.sh | bash
  when: ansible_facts['distribution'] == "Archlinux"

- name: Install context7
  ansible.builtin.command: bunx ctx7 setup --claude --curor --universal --antigravity --opencode --codex --gemini --mcp --cli -y
  when: ansible_facts['distribution'] == "Archlinux"

- name: Install global skills
