---
- name: Install packages from pacman
  community.general.pacman:
    name: "{{ pacman_item }}"
    state: present
  loop:
    - git-lfs
    - xdg-desktop-portal-wlr
    - xdg-desktop-portal-gtk
    - github-cli
    - ripgrep # better grep
    # - zathura # pdf viewer
    - evince # pdf viewer
    - remind # proper reminder tool
    - zip
    - unzip
    - eza # better ls
    - wget
    - tldr # better man pages
    - bat # better cat
    - trash-cli
    - zsh # better shell
    - mise # dev tools version manager
    - wlsunset # warm screen display
    - fzf # fuzzy searching tool
    - qbittorrent # torrent client
    - qt6-wayland
    - qt5-wayland
    - duf # better df
    - zoxide # better cd
    - lshw
    - vivaldi
    - telegram-desktop
    - nemo # file manager (found it better than thunder)
    - fastfetch # rip neofetch
    - blueman # bluetooth gui manager
    - btop # better htop/top
    - meld # gui diffing tool
    - gnome-keyring # keyring itself
    - libsecret # for keyring
    - seahorse # afair its for keyring
    # - xplr # rust based lua hackable tui file manager, too complicated
    - mpv # video player
    - jq # json processor
    - yq # yaml, toml etc. processor
    - ark # kde gui archives manager
    - baobab # storage analyzer gui
    - ncdu # space analyzer
    - hyprpicker # Wayland color picker
    - caligula # dd wrapper with cool features
    - wl-clipboard # its and couple more down are the waybinder dependencies (look for the binary in the /bin + https://gitlab.com/cscs/waybinder)
    - wtype
    - tree
    - zenity # gui gtk propmts
    - eog # eye of gnome - image viewer
    - tesseract # OCR program
  become: true
  loop_control:
    loop_var: pacman_item
  when: ansible_distribution == "Archlinux"


- name: Install packages from AUR
  ansible.builtin.command: yay -S --noconfirm {{ aur_item }}
  loop:
    # - stretchly-bin # don't stare at screen too hard
    - zen-browser-bin
    - lazydocker-bin # docker TUI
    - throne-bin # docker TUI
  loop_control:
    loop_var: aur_item
  when: ansible_distribution == "Archlinux"

- name: Setup dev globals
  ansible.builtin.command: mise use -g {{ mise_item }}@latest
  loop:
    - node
  loop_control:
    loop_var: mise_item
  when: ansible_distribution == "Archlinux"

- name: Check if rtk is installed
  ansible.builtin.command: command -v rtk
  register: rtk_check
  changed_when: false
  failed_when: false
  when: ansible_distribution == "Archlinux"

- name: Install rtk
  ansible.builtin.shell: curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
  args:
    executable: /bin/bash
  when:
    - ansible_distribution == "Archlinux"
    - rtk_check.rc != 0

- name: Enable rtk globally
  ansible.builtin.command: rtk init --global --auto-patch
  when: ansible_distribution == "Archlinux"
