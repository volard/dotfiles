- name: Ensure .config directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.cache/lf"
    state: directory
    mode: "0755"

- name: Ensure lfcd.sh executable
  ansible.builtin.file:
    path: "{{ role_path }}/files/lfcd.sh"
    state: file
    mode: '0755'

- name: Ensure preview executable
  ansible.builtin.file:
    path: "{{ role_path }}/files/preview.sh"
    state: file
    mode: '0755'
