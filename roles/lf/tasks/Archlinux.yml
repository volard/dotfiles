---
- name: Install packages from pacman
  community.general.pacman:
    name: "{{ pacman_item }}"
    state: present
  loop:
    - lf
    - trash-cli 
    - chafa # image previwes
    - less
    - lesspipe # massive previews for a lot of shit
    - 7zip # archieves previews and interactions
    - eza # directory previews
    - bat # files previews
    - poppler # for pdfs previews
  become: true
  loop_control:
    loop_var: pacman_item
  when: ansible_distribution == "Archlinux"

- name: Create a symlink
  ansible.builtin.file:
    src: "{{ role_path }}/files"
    dest: "{{ ansible_user_dir }}/.config/lf"
    mode: "0755"
    state: link
    force: true

