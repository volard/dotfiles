bind_to_address    "127.0.0.1"
#bind_to_address   "~/.mpd/socket"
music_directory    "/mnt/data/volard-pc/Moosiq"
playlist_directory "~/.mpd/playlists"
# db_file          "~/.mpd/mpd.db"
log_file           "~/.mpd/mpd.log"
pid_file           "~/.mpd/mpd.pid"
auto_update        "yes"
restore_paused     "yes"
state_file         "~/.mpd/mpdstate"

audio_output {
    type      "pulse"
    name      "Alsa/PulseAudio"
}

playlist_plugin {
    name      "m3u"
    enabled   "true"
}

audio_output {
    type      "fifo"
    name      "my_fifo"
    path      "/tmp/mpd.fifo"
    format    "44100:16:2"
}
