---
- name: Install Zsh
  community.general.pacman:
    name: zsh
    state: present
  become: true

- name: Ensure Zsh is installed
  ansible.builtin.package:
    name: zsh
    state: present
  become: true

- name: Set Zsh as the default shell
  ansible.builtin.user:
    name: "{{ ansible_env.USER }}"
    shell: /usr/bin/zsh
  become: true

- name: Install Oh My Zsh
  ansible.builtin.shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  args:
    creates: ~/.oh-my-zsh

- name: Ensure zsh-syntax-highlighting directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'ZSH_CUSTOM') | default('~/.oh-my-zsh/custom') }}/plugins/zsh-syntax-highlighting"
    state: directory
    mode: "0755"

- name: Clone or update zsh-syntax-highlighting repository
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "{{ lookup('env', 'ZSH_CUSTOM') | default('~/.oh-my-zsh/custom') }}/plugins/zsh-syntax-highlighting"
    update: true

- name: Remove default .zshrc configuration
  ansible.builtin.file:
    path: ~/.zshrc
    state: absent

- name: Create a symbolic link for .zshrc
  ansible.builtin.file:
    src: ~/dotfiles/roles/zsh/files/.zshrc
    dest: ~/.zshrc
    state: link

- name: Create a symbolic link for .aliases
  ansible.builtin.file:
    src: ~/dotfiles/roles/zsh/files/.aliases
    dest: ~/.aliases
    state: link
