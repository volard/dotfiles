---
- name: Install Zsh
  community.general.pacman:
    name: zsh
    state: present
  become: true

- name: Ensure Zsh is installed
  ansible.builtin.package:
    name: zsh
    state: present
  become: true

- name: Set Zsh as the default shell
  ansible.builtin.user:
    name: "{{ ansible_env.USER }}"
    shell: /usr/bin/zsh
  become: true

- name: Install Oh My Zsh
  ansible.builtin.shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  args:
    creates: ~/.oh-my-zsh

- name: Get home directory
  ansible.builtin.set_fact:
    user_home: "{{ lookup('env', 'HOME') | default(ansible_user_dir) }}"

- name: Get ZSH_CUSTOM environment variable
  ansible.builtin.set_fact:
    zsh_custom_env: "{{ lookup('env', 'ZSH_CUSTOM') | default('', true) | trim }}"

- name: Set zsh custom directory path
  ansible.builtin.set_fact:
    zsh_custom_dir: "{{ zsh_custom_env if zsh_custom_env | length > 0 else (user_home + '/.oh-my-zsh/custom') }}"

- name: Set zsh custom plugins directory path
  ansible.builtin.set_fact:
    zsh_custom_plugins: "{{ zsh_custom_dir }}/plugins/zsh-syntax-highlighting"

- name: Ensure zsh custom plugins parent directory exists
  ansible.builtin.file:
    path: "{{ zsh_custom_dir }}/plugins"
    state: directory
    mode: "0755"
    owner: "{{ ansible_env.USER }}"
    group: "{{ ansible_env.USER }}"

- name: Check zsh-syntax-highlighting directory status
  ansible.builtin.stat:
    path: "{{ zsh_custom_plugins }}"
  register: zsh_custom_plugins_stat

- name: Remove zsh-syntax-highlighting directory if owned by root
  ansible.builtin.file:
    path: "{{ zsh_custom_plugins }}"
    state: absent
  become: true
  when: zsh_custom_plugins_stat.stat.exists is defined and zsh_custom_plugins_stat.stat.exists and zsh_custom_plugins_stat.stat.uid == 0

- name: Ensure zsh-syntax-highlighting directory exists
  ansible.builtin.file:
    path: "{{ zsh_custom_plugins }}"
    state: directory
    mode: "0755"
    owner: "{{ ansible_env.USER }}"
    group: "{{ ansible_env.USER }}"
    recurse: true

- name: Clone or update zsh-syntax-highlighting repository
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "{{ zsh_custom_plugins }}"
    update: true
    force: yes
    

- name: Ensure zsh custom themes directory exists
  ansible.builtin.file:
    path: "{{ zsh_custom_dir }}/themes"
    state: directory
    mode: "0755"
    owner: "{{ ansible_env.USER }}"
    group: "{{ ansible_env.USER }}"

- name: Create a symbolic link for volard.zsh-theme in custom themes directory
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/dotfiles/roles/zsh/files/volard.zsh-theme"
    dest: "{{ zsh_custom_dir }}/themes/volard.zsh-theme"
    state: link
    force: true
    owner: "{{ ansible_env.USER }}"
    group: "{{ ansible_env.USER }}"


- name: Remove default .zshrc configuration
  ansible.builtin.file:
    path: ~/.zshrc
    state: absent

- name: Render .zshrc from template
  ansible.builtin.template:
    src: .zshrc.j2
    dest: ~/.zshrc
    mode: "0644"

- name: Create a symbolic link for .aliases
  ansible.builtin.file:
    src: ~/dotfiles/roles/zsh/files/.aliases
    dest: ~/.aliases
    state: link
