---
- name: Install packages from pacman
  community.general.pacman:
    name: "{{ pacman_item }}"
    state: present
  loop:
    - virt-manager
    - qemu
    - libvirt
    - edk2-ovmf
    - dnsmasq
    - bridge-utils
    - openbsd-netcat
    - iptables-nft
  become: true
  loop_control:
    loop_var: pacman_item
  when: ansible_distribution == "Archlinux"

- name: Create docker group
  ansible.builtin.group:
    name: libvirt
    state: present
  become: true

- name: Add user volard to docker group
  ansible.builtin.user:
    name: volard
    groups: libvirt
    append: true
  become: true

- name: Enable and start libvirtd service
  ansible.builtin.systemd:
    name: libvirtd
    enabled: true
    state: started
  become: true

- name: Delete a file
  ansible.builtin.file:
    path: "/etc/libvirt/libvirt.conf"
    state: absent
    force: true
  become: true

- name: Create a symlink to a file
  ansible.builtin.file:
    src: "{{ role_path }}/files/libvirtd.conf"
    dest: "/etc/libvirt/libvirt.conf"
    state: link
    force: true
  become: true


- name: Delete a file
  ansible.builtin.file:
    path: "/etc/libvirt/qemu.conf"
    state: absent
    force: true
  become: true

- name: Create a symlink to a file
  ansible.builtin.file:
    src: "{{ role_path }}/files/qemu.conf"
    dest: "/etc/libvirt/qemu.conf"
    state: link
    force: true
  become: true


- name: Delete a file
  ansible.builtin.file:
    path: "/etc/libvirt/network.conf"
    state: absent
    force: true
  become: true

- name: Create a symlink to a file
  ansible.builtin.file:
    src: "{{ role_path }}/files/network.conf"
    dest: "/etc/libvirt/network.conf"
    state: link
    force: true
  become: true
