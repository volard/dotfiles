---
- name: Install Cursor from AUR
  ansible.builtin.include_tasks: roles/common_tasks/tasks/require_aur_packages.yml
  vars:
    aur_packages:
      - cursor-bin
    aur_requirement_context: vscode role

- name: Create Cursor config symlinks
  ansible.builtin.include_tasks: roles/common_tasks/tasks/create_symlinks.yml
  vars:
    symlinks:
      - src: "{{ role_path }}/files/settings.json"
        dest: "{{ ansible_facts['user_dir'] }}/.config/Cursor/User/settings.json"
      - src: "{{ role_path }}/files/keybindings.json"
        dest: "{{ ansible_facts['user_dir'] }}/.config/Cursor/User/keybindings.json"
  when: ansible_facts['distribution'] == 'Archlinux'
