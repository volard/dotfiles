---
- name: Ensure .config directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/Cursor/User"
    state: directory
    mode: "0755"
  become: true

- name: "Create symlink to settings files"
  ansible.builtin.file:
    src: "{{ role_path }}/files/settings.json"
    dest: "{{ ansible_user_dir }}/.config/Cursor/User/settings.json"
    state: link
    force: true
  when: ansible_distribution == 'Archlinux'


- name: "Create symlink to settings files"
  ansible.builtin.file:
    src: "{{ role_path }}/files/keybindings.json"
    dest: "{{ ansible_user_dir }}/.config/Cursor/User/keybindings.json"
    state: link
    force: true
  when: ansible_distribution == 'Archlinux'
