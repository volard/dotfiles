---
- name: Install required packages on Fedora
  ansible.builtin.dnf:
    name: "{{ dnf_item }}"
    state: present
  loop:
    - sway
    - sweet-gtk-theme
    - swayidle
  become: true
  loop_control:
    loop_var: dnf_item
  when: ansible_facts['distribution'] == "Fedora"


- name: Create Sway config symlink
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/common_tasks/tasks/create_symlinks.yml"
  vars:
    symlink:
      src: "{{ role_path }}/files"
      dest: "{{ ansible_facts['user_dir'] }}/.config/sway"
  when: ansible_facts['distribution'] == 'Fedora'
