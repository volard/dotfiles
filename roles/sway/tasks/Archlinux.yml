---
# https://forum.endeavouros.com/t/unable-to-share-screen-with-sway-wm/46654
- name: Install packages from pacman
  pacman:
    name: "{{ pacman_item }}"
    state: present
  loop:
    - xdg-desktop-portal-wlr
    - xdg-desktop-portal
    - pipewire
  become: true
  loop_control:
    loop_var: pacman_item
  when: ansible_distribution == "Archlinux"

- name: Enable and start pipewire service
  command: systemctl enable --now --user pipewire
  become: true
  when: ansible_distribution == 'Archlinux'

- name: Enable and start xdg-desktop-portal service
  command: systemctl enable --now --user xdg-desktop-portal
  become: true
  when: ansible_distribution == 'Archlinux'

# reload the system

- name: Delete a directory
  file:
    path: "{{ ansible_user_dir }}/.config/sway"
    state: absent
  when: ansible_distribution == 'Archlinux'

- name: "Create symlink to role files directory"
  ansible.builtin.file:
    src: "{{ role_path }}/endeavour_sway"
    dest: "{{ ansible_user_dir }}/.config/sway"
    state: link
    force: true
  when: ansible_distribution == 'Archlinux'

- name: Delete a directory
  file:
    path: "{{ ansible_user_dir }}/.config/gtklock"
    state: absent
  when: ansible_distribution == 'Archlinux'

- name: "Create symlink to role files directory"
  ansible.builtin.file:
    src: "{{ role_path }}/gtklok"
    dest: "{{ ansible_user_dir }}/.config/gtklok"
    state: link
    force: true
  when: ansible_distribution == 'Archlinux'

- name: Set all files in the specified directory to executable
  file:
    path: "{{ item }}"
    mode: 'u+x'
  with_fileglob:
    - "{{ ansible_user_dir }}/.config/sway/scripts/*"
