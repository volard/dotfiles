---
- name: Create font directory
  ansible.builtin.file:
    path: /usr/local/share/fonts
    state: directory
    mode: '0755'
  become: true

- name: Download JetBrains Mono Nerd Font
  ansible.builtin.get_url:
    url: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.zip
    dest: /tmp/JetBrainsMono.zip
    mode: '0755'
  become: true

- name: Unzip JetBrains Mono Nerd Font
  ansible.builtin.unarchive:
    src: /tmp/JetBrainsMono.zip
    dest: /usr/local/share/fonts/
    remote_src: true
  become: true

- name: Check if font cache needs updating
  ansible.builtin.command: fc-list
  register: font_list
  changed_when: false  # This command itself does not change anything

- name: Update font cache if needed
  ansible.builtin.command: fc-cache -f -v
  become: true
  when: font_list.stdout | length > 0  # Run only if there are fonts listed

- name: Clean up downloaded font zip
  ansible.builtin.file:
    path: /tmp/JetBrainsMono.zip
    state: absent
  become: true

- name: Gather local groups
  ansible.builtin.getent:
    database: group

- name: Build list of existing supplemental groups
  ansible.builtin.set_fact:
    linux_setup_existing_groups: >-
      {{
        [
          'sudo', 'wheel', 'libvirt', 'sound', 'audio', 'video', 'docker',
          'plugdev', 'lpadmin', 'netdev', 'input', 'tty', 'users', 'i2c',
          'spi', 'gpio'
        ]
        | select('in', ansible_facts.getent_group.keys())
        | join(',')
      }}

- name: Add user to commonly used groups
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups: "{{ linux_setup_existing_groups }}"
    append: true
  become: true
  when: linux_setup_existing_groups | length > 0
