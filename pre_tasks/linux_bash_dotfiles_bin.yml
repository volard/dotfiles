---
- name: Check if .bashrc exists
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.bashrc"
  register: bashrc_stat

- name: Create .bashrc if it doesn't exist
  ansible.builtin.copy:
    content: source $HOME/.config/.termrc
    dest: "{{ ansible_facts['user_dir'] }}/.bashrc"
    mode: "0644"
  when:
    - not bashrc_stat.stat.exists

- name: Check if source line already exists
  ansible.builtin.command: grep -Fxq "PATH=$PATH:$HOME/dotfiles/bin" "{{ ansible_facts['user_dir'] }}/.bashrc"
  register: grep_result
  changed_when: false
  failed_when: false
  when:
    - bashrc_stat.stat.exists

- name: Add source line to existing .bashrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['user_dir'] }}/.bashrc"
    line: PATH=$PATH:$HOME/dotfiles/bin
    state: present
  when:
    - bashrc_stat.stat.exists
    - grep_result.rc != 0 # Only add line if grep didn't find it

- name: Make a list of dotfiles/bin/ files executable
  ansible.builtin.file:
    path: "{{ script_item }}"
    mode: u+x
  loop:
    - "{{ ansible_facts['user_dir'] }}/dotfiles/bin/dotfiles"
    - "{{ ansible_facts['user_dir'] }}/dotfiles/bin/tsesh"
    - "{{ ansible_facts['user_dir'] }}/dotfiles/bin/hadolint"
    - "{{ ansible_facts['user_dir'] }}/dotfiles/bin/dynamic_wallpapers"
    - "{{ ansible_facts['user_dir'] }}/dotfiles/bin/import-gsettings"
  loop_control:
    loop_var: script_item

- name: Source bashrc for the current shell session
  block:
    - name: Check if running interactively
      ansible.builtin.set_fact:
        is_interactive: "{{ lookup('env', 'PS1') is defined }}"
      changed_when: false

    - name: Source bashrc if interactive
      when: is_interactive
      ansible.builtin.command: /bin/bash -c "source ~/.bashrc"
      changed_when: false
  become: false
